name: Multi Registry Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: hohongya
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t hohongya/flask-multi-registry:latest .

      - name: Push Docker Hub
        run: |
          docker push hohongya/flask-multi-registry:latest